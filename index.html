<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chronicle</title>
  <base href="public/" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Left nav panel (pages + journals) ── -->
  <div class="nav-overlay" id="navOverlay"></div>
  <aside class="nav-panel" id="navPanel" aria-label="Navigator">
    <div class="nav-header">
      <div class="nav-tabs">
        <button class="nav-tab active" data-pane="pagesPane">Pages</button>
        <button class="nav-tab" data-pane="journalsPane">Journals</button>
      </div>
      <button class="nav-close" id="navClose" aria-label="Close navigator">
        <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="nav-body">
      <div class="nav-pane active" id="pagesPane">
        <button class="nav-pane-action-btn" id="addPageNavBtn">+ Add page</button>
        <div id="pagesList"></div>
      </div>
      <div class="nav-pane" id="journalsPane">
        <button class="nav-pane-action-btn" id="newJournalBtn">+ New journal</button>
        <div id="journalsList"></div>
      </div>
    </div>
  </aside>

  <!-- ── Nova AI panel ── -->
  <div class="journie-panel" id="journiePanel">
    <div class="nova-resize-handle" id="novaDragHandle"></div>
    <div class="journie-panel-header">
      <span class="journie-panel-title">✨ Nova</span>
      <button class="journie-panel-close" id="journiePanelClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="journie-panel-messages" id="journiePanelMessages"></div>
    <div class="journie-panel-footer">
      <textarea class="journie-panel-input" id="journiePanelInput" placeholder="Ask Nova..." rows="2"></textarea>
      <button class="journie-panel-send" id="journiePanelSend">
        <svg viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <!-- ── Fixed top bar ── -->
  <header class="top-bar">
    <div class="top-bar-left">
      <button class="hamburger-btn" id="navToggle" aria-label="Open navigator" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <span class="app-title">Chronicle</span>
    </div>
    <div class="top-bar-center" id="toolbarContainer"></div>
    <div class="top-bar-right">
      <span class="page-indicator" id="pageIndicator">Page 1</span>
      <button class="save-btn top-bar-save" id="saveBtn">Save</button>
      <button class="hamburger-btn" id="settingsToggle" aria-label="Open settings" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.33.07-.67.07-1.08 0-.41-.03-.74-.07-1.08l2.34-1.82c.21-.17.27-.45.13-.69l-2.21-3.84c-.14-.23-.42-.32-.66-.23l-2.76 1.11c-.58-.44-1.2-.8-1.89-1.08l-.42-2.93A.56.56 0 0 0 13.5 3h-4.42c-.27 0-.49.2-.54.46l-.42 2.93c-.69.28-1.31.64-1.89 1.08L3.47 6.36c-.24-.09-.52 0-.66.23L.6 10.43c-.14.24-.08.52.13.69l2.34 1.82C3.03 13.26 3 13.6 3 14c0 .4.03.74.07 1.08L.73 16.9c-.21.17-.27.45-.13.69l2.21 3.84c.14.23.42.32.66.23l2.76-1.11c.58.44 1.2.8 1.89 1.08l.42 2.93c.05.26.27.46.54.46H13.5c.27 0 .49-.2.54-.46l.42-2.93c.69-.28 1.31-.64 1.89-1.08l2.76 1.11c.24.09.52 0 .66-.23l2.21-3.84c.14-.24.08-.52-.13-.69l-2.32-1.82z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Scrollable pages area ── -->
  <main class="pages-container" id="pagesContainer"></main>

  <!-- ── Settings sidebar ── -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="settings-sidebar" id="settingsSidebar" aria-label="Settings">

    <div class="sidebar-header">
      <span class="sidebar-title">Settings</span>
      <button class="sidebar-close" id="sidebarClose" aria-label="Close settings">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <section class="sidebar-section">
      <span class="sidebar-label">Page Colour</span>
      <div class="color-swatches">
        <button class="page-swatch active" data-color="cream"    title="Cream"       style="--swatch-bg:#fffdf7"></button>
        <button class="page-swatch"        data-color="white"    title="White"       style="--swatch-bg:#ffffff"></button>
        <button class="page-swatch"        data-color="yellow"   title="Warm Yellow" style="--swatch-bg:#fef9e7"></button>
        <button class="page-swatch"        data-color="sage"     title="Sage"        style="--swatch-bg:#f0f4ee"></button>
        <button class="page-swatch"        data-color="blue"     title="Sky Blue"    style="--swatch-bg:#eef2f8"></button>
        <button class="page-swatch"        data-color="blush"    title="Blush"       style="--swatch-bg:#fdf0f0"></button>
        <button class="page-swatch"        data-color="charcoal" title="Charcoal"    style="--swatch-bg:#e8e4df"></button>
      </div>
    </section>

    <section class="sidebar-section">
      <span class="sidebar-label">Appearance</span>
      <div class="toggle-row">
        <span class="toggle-label">Dark mode</span>
        <label class="toggle-switch" aria-label="Toggle dark mode">
          <input type="checkbox" id="darkModeToggle" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>
      <div class="toggle-row" style="margin-top:12px">
        <span class="toggle-label">Margin</span>
        <label class="toggle-switch" aria-label="Toggle red margin">
          <input type="checkbox" id="marginToggle" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>
    </section>

    <section class="sidebar-section">
      <span class="sidebar-label">Page Size</span>
      <div class="option-pills">
        <button class="option-pill" data-size="a5">A5</button>
        <button class="option-pill active" data-size="a4">A4</button>
        <button class="option-pill" data-size="letter">Letter</button>
        <button class="option-pill" data-size="wide">Wide</button>
      </div>
    </section>

    <section class="sidebar-section">
      <span class="sidebar-label">Line Spacing</span>
      <div class="option-pills">
        <button class="option-pill" data-spacing="narrow">Narrow</button>
        <button class="option-pill active" data-spacing="medium">Medium</button>
        <button class="option-pill" data-spacing="wide">Wide</button>
        <button class="option-pill" data-spacing="none">None</button>
      </div>
    </section>

    <section class="sidebar-section">
      <span class="sidebar-label">Style</span>
      <div class="template-grid">
        <button class="template-card" data-template="ruled">
          <div class="template-preview"></div>
          <span class="template-name">Ruled</span>
        </button>
        <button class="template-card active" data-template="blank">
          <div class="template-preview"></div>
          <span class="template-name">Blank</span>
        </button>
        <button class="template-card" data-template="dotted">
          <div class="template-preview"></div>
          <span class="template-name">Dotted</span>
        </button>
        <button class="template-card" data-template="grid">
          <div class="template-preview"></div>
          <span class="template-name">Grid</span>
        </button>
      </div>
    </section>

    <section class="sidebar-section">
      <span class="sidebar-label">Templates</span>
      <div class="bg-template-list" id="bgTemplateList">
        <button class="bg-template-card active" data-bg="none" title="No background">
          <div class="bg-template-thumb bg-template-none"></div>
        </button>
        <button class="bg-template-card" data-bg="/images/templates/1.png" title="Template 1">
          <img class="bg-template-thumb" src="/images/templates/1.png" alt="Template 1" />
        </button>
        <button class="bg-template-card" data-bg="/images/templates/2.png" title="Template 2">
          <img class="bg-template-thumb" src="/images/templates/2.png" alt="Template 2" />
        </button>
        <button class="bg-template-card" data-bg="/images/templates/3.png" title="Template 3">
          <img class="bg-template-thumb" src="/images/templates/3.png" alt="Template 3" />
        </button>
        <button class="bg-template-card" data-bg="/images/templates/4.png" title="Template 4">
          <img class="bg-template-thumb" src="/images/templates/4.png" alt="Template 4" />
        </button>
        <button class="bg-template-card" data-bg="/images/templates/5.png" title="Template 5">
          <img class="bg-template-thumb" src="/images/templates/5.png" alt="Template 5" />
        </button>
        <button class="bg-template-card" data-bg="/images/templates/6.png" title="Template 6">
          <img class="bg-template-thumb" src="/images/templates/6.png" alt="Template 6" />
        </button>
        <button class="bg-template-card" data-bg="/images/templates/7.jpeg" title="Template 7">
          <img class="bg-template-thumb" src="/images/templates/7.jpeg" alt="Template 7" />
        </button>
        <button class="bg-template-card" data-bg="/images/templates/8.png" title="Template 8">
          <img class="bg-template-thumb" src="/images/templates/8.png" alt="Template 8" />
        </button>
        <button class="bg-template-card" data-bg="/images/templates/9.png" title="Template 9">
          <img class="bg-template-thumb" src="/images/templates/9.png" alt="Template 9" />
        </button>
        <button class="bg-template-card" data-bg="/images/templates/10.png" title="Template 10">
          <img class="bg-template-thumb" src="/images/templates/10.png" alt="Template 10" />
        </button>
        <button class="bg-template-card" data-bg="/images/templates/11.png" title="Template 11">
          <img class="bg-template-thumb" src="/images/templates/11.png" alt="Template 11" />
        </button>
        <button class="bg-template-card" data-bg="/images/templates/12.png" title="Template 12">
          <img class="bg-template-thumb" src="/images/templates/12.png" alt="Template 12" />
        </button>
        <button class="bg-template-card" data-bg="/images/templates/before.png" title="Before">
          <img class="bg-template-thumb" src="/images/templates/before.png" alt="Before" />
        </button>
      </div>
    </section>

  </aside>

  <!-- ── Bottom bar ── -->
  <div class="bottom-bar">
    <div></div>
    <button class="add-page-btn" id="addPageBtn">+ Add page</button>
  </div>

  <!-- ── Save title modal ── -->
  <div class="modal-overlay" id="titleModalOverlay">
    <div class="modal" id="titleModal" role="dialog" aria-modal="true" aria-labelledby="titleModalHeading">
      <h2 class="modal-heading" id="titleModalHeading">Name this journal</h2>
      <p class="modal-sub">Give your journal a title before saving.</p>
      <input class="modal-input" id="titleModalInput" type="text" placeholder="e.g. Summer thoughts…" maxlength="80" />
      <div class="modal-actions">
        <button class="modal-btn modal-btn--cancel" id="titleModalCancel">Cancel</button>
        <button class="modal-btn modal-btn--save"   id="titleModalSave">Save</button>
      </div>
    </div>
  </div>

  <!-- ── Unsaved changes dialog ── -->
  <div class="modal-overlay" id="unsavedModalOverlay">
    <div class="modal" id="unsavedModal" role="dialog" aria-modal="true" aria-labelledby="unsavedModalHeading">
      <h2 class="modal-heading" id="unsavedModalHeading">Unsaved changes</h2>
      <p class="modal-sub">What would you like to do with the current journal?</p>
      <input class="modal-input" id="unsavedTitleInput" type="text" placeholder="Enter a title to save…" maxlength="80" />
      <div class="modal-actions">
        <button class="modal-btn modal-btn--cancel" id="unsavedDiscard">Discard</button>
        <button class="modal-btn modal-btn--cancel" id="unsavedAutosave">Autosave</button>
        <button class="modal-btn modal-btn--save" id="unsavedSave" disabled>Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
